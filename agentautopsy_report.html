<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AgentAutopsy</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b949e;
      --cyan: #56d4dd;
      --yellow: #e3b341;
      --green: #3fb950;
      --red: #f85149;
      --blue: #79c0ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header h1 { margin: 0; font-size: 1.25rem; }
    header p { margin: 0.25rem 0 0; color: var(--muted); font-size: 0.9rem; }
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: calc(100vh - 72px);
    }
    .runs {
      border-right: 1px solid var(--border);
      background: var(--panel);
      overflow-y: auto;
    }
    .runs h2 {
      margin: 0;
      padding: 1rem 1rem 0.5rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    .run-item {
      display: block;
      width: 100%;
      text-align: left;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 0.85rem 1rem;
      cursor: pointer;
    }
    .run-item:hover { background: #243044; }
    .run-item.active { background: #2d3f56; border-left: 3px solid var(--cyan); }
    .run-id { font-family: ui-monospace, monospace; font-size: 0.75rem; color: var(--muted); }
    .run-meta { margin-top: 0.35rem; font-size: 0.85rem; }
    .detail { padding: 1.5rem; overflow-y: auto; }
    .empty { color: var(--muted); padding: 2rem; }
    .timeline { list-style: none; margin: 0; padding: 0; }
    .event {
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      border-radius: 8px;
      background: #121a24;
      border-left: 4px solid var(--muted);
    }
    .event .type {
      font-weight: 600;
      font-family: ui-monospace, monospace;
      font-size: 0.85rem;
    }
    .event .summary {
      margin-top: 0.35rem;
      color: var(--muted);
      font-size: 0.9rem;
      word-break: break-word;
    }
    .event .ts {
      margin-top: 0.25rem;
      font-size: 0.75rem;
      color: #6e7681;
    }
    .event.llm_call { border-left-color: var(--cyan); }
    .event.llm_call .type { color: var(--cyan); }
    .event.http_request { border-left-color: var(--yellow); }
    .event.http_request .type { color: var(--yellow); }
    .event.http_response { border-left-color: var(--green); }
    .event.http_response .type { color: var(--green); }
    .event.error { border-left-color: var(--red); }
    .event.error .type { color: var(--red); }
    .event.llm_response { border-left-color: var(--blue); }
    .event.llm_response .type { color: var(--blue); }
    .root-cause {
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      border: 1px solid var(--red);
      border-radius: 8px;
      background: #2a1518;
      color: var(--red);
      font-weight: 600;
    }
    .run-header {
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .run-header code { font-size: 0.8rem; color: var(--cyan); }
    .run-summary {
      margin-bottom: 1rem;
      padding: 1rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #121a24;
    }
    .run-summary h3 {
      margin: 0 0 0.75rem;
      font-size: 0.95rem;
      color: var(--cyan);
    }
    .run-summary p {
      margin: 0.35rem 0;
      font-size: 0.9rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <h1>AgentAutopsy</h1>
    <p>When your agent fails, this tells you exactly why.</p>
  </header>
  <div class="layout">
    <aside class="runs">
      <h2>Runs</h2>
      <div id="run-list"></div>
    </aside>
    <main class="detail" id="detail">
      <div class="empty">Select a run to view its event timeline.</div>
    </main>
  </div>
  <script>
    const runs = [{"id": "8350be7e-cae8-420b-9369-95fa792de4c3", "start_time": "2026-05-27T10:35:01.084324+00:00", "status": "running"}];
    const runsData = {"8350be7e-cae8-420b-9369-95fa792de4c3": {"items": [{"type": "llm_call", "timestamp": "2026-05-27T10:35:03.215440+00:00", "payload": {"model": "gpt-4", "messages": [{"role": "user", "content": "fetch data"}]}, "detail": "model: gpt-4", "latency_ms": null, "token_input": null, "token_output": null, "cost_usd": null}, {"type": "error", "timestamp": "2026-05-27T10:35:03.220364+00:00", "payload": {"error_type": "TimeoutError", "message": "request timed out after 30s"}, "detail": "TimeoutError: request timed out after 30s", "latency_ms": null, "token_input": null, "token_output": null, "cost_usd": null}, {"type": "llm_call", "timestamp": "2026-05-27T10:35:03.506262+00:00", "payload": {"provider": "anthropic", "model": "claude-haiku-4-5-20251001", "messages": [{"role": "user", "content": "Error: TimeoutError: request timed out after 30s\nTrace:\n- [llm_call] {'model': 'gpt-4', 'messages': [{'role': 'user', 'content': 'fetch data'}]}\n- [error] {'error_type': 'TimeoutError', 'message': 'request timed out after 30s'}"}]}, "detail": "model: claude-haiku-4-5-20251001", "latency_ms": null, "token_input": null, "token_output": null, "cost_usd": null}, {"type": "http_request", "timestamp": "2026-05-27T10:35:03.650164+00:00", "payload": {"method": "POST", "url": "https://api.anthropic.com/v1/messages"}, "detail": "POST https://api.anthropic.com/v1/messages", "latency_ms": null, "token_input": null, "token_output": null, "cost_usd": null}, {"type": "http_response", "timestamp": "2026-05-27T10:35:06.623480+00:00", "payload": {"status_code": 200}, "detail": "status: 200", "latency_ms": null, "token_input": null, "token_output": null, "cost_usd": null}, {"type": "llm_response", "timestamp": "2026-05-27T10:35:06.672147+00:00", "payload": {}, "detail": "cassette: 1446 bytes \u00b7 3161ms \u00b7 tokens 160/239 \u00b7 $0.000339", "latency_ms": 3161, "token_input": 160, "token_output": 239, "cost_usd": 0.00033875}], "root_cause": "TimeoutError \u2014 request timed out after 30s", "summary": {"total_token_input": 160, "total_token_output": 239, "total_tokens": 399, "total_cost_usd": 0.000339, "total_latency_ms": 3161}}};
    const runList = document.getElementById("run-list");
    const detail = document.getElementById("detail");

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = String(text);
      return div.innerHTML;
    }

    function renderRun(runId) {
      const data = runsData[runId] || { items: [], root_cause: null };
      const events = data.items || [];
      const run = runs.find(r => r.id === runId);
      let html = '<div class="run-header"><h2>Run timeline</h2><p><code>' + escapeHtml(runId) + '</code></p>';
      if (run) {
        html += '<p>Status: <strong>' + escapeHtml(run.status || "") + '</strong> · Started: ' + escapeHtml(run.start_time || "") + '</p>';
      }
      const summary = data.summary || {};
      html += '</div><div class="run-summary"><h3>Run Summary</h3>';
      html += '<p>Total tokens: ' + escapeHtml(summary.total_tokens || 0) + ' (in ' + escapeHtml(summary.total_token_input || 0) + ' / out ' + escapeHtml(summary.total_token_output || 0) + ')</p>';
      html += '<p>Total cost: $' + escapeHtml(Number(summary.total_cost_usd || 0).toFixed(6)) + '</p>';
      html += '<p>Total latency: ' + escapeHtml(summary.total_latency_ms || 0) + 'ms</p></div>';
      html += '<ul class="timeline">';
      events.forEach((ev, idx) => {
        const cls = (ev.type || "unknown").replace(/[^a-z0-9_]/g, "_");
        html += '<li class="event ' + cls + '"><div class="type">[' + escapeHtml(ev.type) + ']</div>';
        if (ev.detail) {
          html += '<div class="summary">' + escapeHtml(ev.detail) + '</div>';
        }
        html += '<div class="ts">#' + (idx + 1) + ' · ' + escapeHtml(ev.timestamp || "") + '</div></li>';
      });
      html += '</ul>';
      if (data.root_cause) {
        html += '<div class="root-cause">Root Cause: ' + escapeHtml(data.root_cause) + '</div>';
      }
      detail.innerHTML = html;
    }

    if (runs.length === 0) {
      runList.innerHTML = '<div class="empty" style="padding:1rem">No runs found.</div>';
      detail.innerHTML = '<div class="empty">No data in agentautopsy.db yet.</div>';
    } else {
      runs.forEach((run, index) => {
        const btn = document.createElement("button");
        btn.className = "run-item" + (index === 0 ? " active" : "");
        btn.type = "button";
        btn.innerHTML = '<div class="run-id">' + escapeHtml(run.id) + '</div><div class="run-meta">' +
          escapeHtml(run.status || "") + ' · ' + escapeHtml(run.start_time || "") + '</div>';
        btn.addEventListener("click", () => {
          document.querySelectorAll(".run-item").forEach(el => el.classList.remove("active"));
          btn.classList.add("active");
          renderRun(run.id);
        });
        runList.appendChild(btn);
      });
      renderRun(runs[0].id);
    }
  </script>
</body>
</html>
