[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentautopsy"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "openai",
    "anthropic",
    "sqlite-utils",
    "sqlite-vec",
    "httpx",
]

[project.scripts]
agentautopsy = "agentautopsy.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/agentautopsy"]
