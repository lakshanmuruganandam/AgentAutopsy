name: AgentAutopsy CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mypy pylint bandit flake8
        pip install -e .
        
    - name: Run Static Analysis (Flake8)
      run: |
        flake8 src/agentautopsy/ --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Run Type Checking (Mypy)
      run: |
        mypy --config-file=pyproject.toml src/agentautopsy/ --ignore-missing-imports
        
    - name: Run Security Audit (Bandit)
      run: |
        bandit -c pyproject.toml -r src/agentautopsy/ -ll
        
    - name: Run Unit Tests
      run: |
        python -m unittest discover tests
